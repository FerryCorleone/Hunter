name: Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - codex/windows-port
    paths:
      - "windows/**"
      - ".github/workflows/windows-ci.yml"
  pull_request:
    paths:
      - "windows/**"
      - ".github/workflows/windows-ci.yml"

jobs:
  build-windows:
    name: Build Windows app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build and smoke test
        shell: pwsh
        run: |
          ./windows/build-windows.ps1 -Configuration Release -Runtime win-x64 -Output artifacts/Hunter-Windows

      - name: UI render smoke
        shell: pwsh
        run: |
          ./artifacts/Hunter-Windows/Hunter.Windows.exe --smoke-ui-render artifacts/hunter-windows-ui-smoke.png

      - name: Foreground smoke
        shell: pwsh
        run: |
          ./artifacts/Hunter-Windows/Hunter.Windows.exe --smoke-foreground

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: Hunter-Windows-win-x64
          path: artifacts/Hunter-Windows-win-x64.zip

      - name: Upload UI smoke image
        uses: actions/upload-artifact@v4
        with:
          name: hunter-windows-ui-smoke
          path: artifacts/hunter-windows-ui-smoke.png
