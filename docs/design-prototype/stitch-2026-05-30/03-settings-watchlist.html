<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Hunter AI 监督 - 黑名单设置</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .mac-shadow {
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .mac-card-border {
            border: 1px solid #E5E5E7;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #D1D1D6;
            border-radius: 10px;
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#007AFF", // Apple Blue
                    "background": "#F5F5F7",
                    "surface": "#FFFFFF",
                    "on-surface": "#1d1d1f",
                    "on-surface-variant": "#86868b",
                    "outline-variant": "#E5E5E7",
                    "error": "#FF3B30"
            }
          }
        }
      }
    </script>
<link href="./settings-common.css" rel="stylesheet"/>
</head>
<body class="hunter-prototype-body">
<!-- macOS Style Window Container -->
<div class="hunter-settings-window">
<div class="flex flex-1 overflow-hidden">
<!-- Sidebar -->
<aside class="hunter-sidebar">
<div class="hunter-window-controls" aria-hidden="true">
<span class="hunter-window-dot red"></span>
<span class="hunter-window-dot yellow"></span>
<span class="hunter-window-dot green"></span>
</div>
<div class="hunter-brand">
<div class="hunter-brand-icon">
<span class="material-symbols-outlined">security</span>
</div>
<div>
<div class="hunter-brand-name">Hunter</div>
<div class="hunter-brand-subtitle">AI 监督</div>
</div>
</div>
<nav class="hunter-nav">
<a class="hunter-nav-item" href="02-settings-general.html">
<span class="material-symbols-outlined">settings</span>
<span>通用</span>
</a>
<a class="hunter-nav-item active" href="03-settings-watchlist.html">
<span class="material-symbols-outlined">visibility_off</span>
<span>黑名单</span>
</a>
<a class="hunter-nav-item" href="04-settings-ai.html">
<span class="material-symbols-outlined">smart_toy</span>
<span>AI</span>
</a>
<a class="hunter-nav-item" href="05-settings-voice.html">
<span class="material-symbols-outlined">mic</span>
<span>声音</span>
</a>
<a class="hunter-nav-item" href="06-settings-history.html">
<span class="material-symbols-outlined">history</span>
<span>历史</span>
</a>
</nav>
</aside>
<!-- Main Content Area -->
<main class="hunter-main">
<!-- Header -->
<header class="hunter-topbar">
<h1 class="hunter-page-title">黑名单</h1>
<p class="hunter-page-subtitle">管理需要监督的网站与应用程序</p>
</header>
<div class="hunter-scroll space-y-8">
<!-- Add Rule Section -->
<section>
<div class="mb-3 px-1">
<h2 class="text-[13px] font-bold text-on-surface">添加网站规则</h2>
</div>
<div class="bg-white rounded-lg mac-card-border p-3">
<div class="flex items-end gap-3">
<div class="flex-1">
<label class="text-[10px] font-bold text-on-surface-variant mb-1 block uppercase">名称</label>
<input class="w-full bg-[#F5F5F7] border border-black/5 rounded px-2.5 py-1.5 text-[13px] focus:ring-1 focus:ring-primary/30 outline-none" placeholder="例如：Netflix" type="text"/>
</div>
<div class="flex-[2]">
<label class="text-[10px] font-bold text-on-surface-variant mb-1 block uppercase">域名或 URL 关键词</label>
<input class="w-full bg-[#F5F5F7] border border-black/5 rounded px-2.5 py-1.5 text-[13px] focus:ring-1 focus:ring-primary/30 outline-none" placeholder="netflix.com" type="text"/>
</div>
<button class="bg-primary text-white text-[13px] font-semibold px-4 py-1.5 rounded hover:opacity-90 transition-opacity active:scale-95 whitespace-nowrap">
                                添加网站
                            </button>
</div>
</div>
</section>
<!-- Presets Section -->
<section>
<div class="mb-3 px-1">
<h2 class="text-[13px] font-bold text-on-surface">常用预设</h2>
</div>
<div class="flex flex-wrap gap-2">
<button class="px-3 py-1 rounded-full bg-black/5 text-on-surface-variant text-[12px] font-medium border border-black/5 flex items-center opacity-50 cursor-default">
<span class="material-symbols-outlined text-[14px] mr-1" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                            YouTube
                        </button>
<button class="px-3 py-1 rounded-full bg-white text-on-surface text-[12px] font-medium border border-black/10 hover:bg-zinc-50 transition-colors">Bilibili</button>
<button class="px-3 py-1 rounded-full bg-white text-on-surface text-[12px] font-medium border border-black/10 hover:bg-zinc-50 transition-colors">抖音</button>
<button class="px-3 py-1 rounded-full bg-black/5 text-on-surface-variant text-[12px] font-medium border border-black/5 flex items-center opacity-50 cursor-default">
<span class="material-symbols-outlined text-[14px] mr-1" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                            X/Twitter
                        </button>
<button class="px-3 py-1 rounded-full bg-white text-on-surface text-[12px] font-medium border border-black/10 hover:bg-zinc-50 transition-colors">Reddit</button>
</div>
</section>
<!-- Installed Apps Section -->
<section>
<div class="mb-3 px-1 flex justify-between items-end">
<h2 class="text-[13px] font-bold text-on-surface">本机 App</h2>
<div class="flex items-center space-x-2">
<div class="relative">
<span class="material-symbols-outlined absolute left-2 top-1.5 text-on-surface-variant text-[16px]">search</span>
<input class="pl-7 pr-3 py-1 bg-white border border-black/10 rounded text-[12px] focus:ring-1 focus:ring-primary/30 w-48 outline-none" placeholder="搜索应用..." type="text"/>
<!-- Dropdown Overlay (Simulated) -->
<div class="absolute top-full left-0 right-0 mt-1 bg-white rounded-lg mac-shadow border border-black/10 overflow-hidden z-30">
<div class="divide-y divide-black/5 max-h-48 overflow-y-auto custom-scrollbar">
<div class="p-2 flex items-center hover:bg-black/5 cursor-pointer">
<div class="w-8 h-8 rounded-md bg-blue-500 flex items-center justify-center mr-2"><span class="material-symbols-outlined text-white text-[18px]">public</span></div>
<div class="flex-1 min-w-0">
<div class="text-[12px] font-semibold truncate">Safari</div>
<div class="text-[10px] text-on-surface-variant truncate">com.apple.Safari</div>
</div>
<button class="text-[10px] font-bold text-primary px-2 py-1 rounded hover:bg-primary/10 transition-colors">添加</button>
</div>
</div>
</div>
</div>
<button class="w-8 h-8 flex items-center justify-center bg-white border border-black/10 rounded text-on-surface-variant hover:bg-zinc-50 transition-colors">
<span class="material-symbols-outlined text-[18px]">refresh</span>
</button>
</div>
</div>
<div class="bg-white rounded-lg mac-card-border overflow-hidden">
<div class="divide-y divide-black/5">
<div class="flex items-center p-2.5 hover:bg-black/[0.02] transition-colors">
<div class="w-9 h-9 rounded-lg bg-[#5865F2] flex items-center justify-center mr-3">
<span class="material-symbols-outlined text-white text-[20px]">chat</span>
</div>
<div class="flex-1">
<div class="text-[13px] font-semibold text-on-surface">Discord</div>
<div class="text-[10px] text-on-surface-variant">com.hnc.Discord</div>
</div>
<button class="px-3 py-1 rounded bg-black/5 text-on-surface-variant text-[11px] font-bold border border-black/5 flex items-center opacity-70 cursor-default">
<span class="material-symbols-outlined text-[12px] mr-1" style="font-variation-settings: 'FILL' 1;">check</span>
                                    已添加
                                </button>
</div>
</div>
</div>
</section>
<!-- Rules List -->
<section>
<div class="mb-3 px-1">
<h2 class="text-[13px] font-bold text-on-surface">已启用规则</h2>
</div>
<div class="bg-white rounded-lg mac-card-border overflow-hidden">
<table class="w-full text-left text-[12px]">
<thead class="bg-zinc-50/80 border-b border-black/5 text-on-surface-variant">
<tr>
<th class="px-4 py-2 font-bold uppercase tracking-tight">规则名称</th>
<th class="px-4 py-2 font-bold uppercase tracking-tight">类型</th>
<th class="px-4 py-2 font-bold uppercase tracking-tight">匹配内容</th>
<th class="px-4 py-2 font-bold uppercase tracking-tight text-right">操作</th>
</tr>
</thead>
<tbody class="divide-y divide-black/5">
<!-- Rule 1 -->
<tr class="hover:bg-black/[0.01]">
<td class="px-4 py-3 font-medium">YouTube</td>
<td class="px-4 py-3">
<span class="px-2 py-0.5 rounded bg-blue-50 text-blue-600 text-[10px] font-bold border border-blue-100 uppercase">网站</span>
</td>
<td class="px-4 py-3 text-on-surface-variant font-mono">youtube.com</td>
<td class="px-4 py-3">
<div class="flex items-center justify-end space-x-3">
<div class="relative inline-flex h-4 w-7 shrink-0 cursor-pointer rounded-full border border-transparent transition-colors duration-200 bg-primary" onclick="this.classList.toggle('bg-primary'); this.classList.toggle('bg-zinc-300'); this.children[0].classList.toggle('translate-x-3'); this.children[0].classList.toggle('translate-x-0')">
<span class="translate-x-3 pointer-events-none inline-block h-3 w-3 transform rounded-full bg-white shadow-sm transition duration-200 ease-in-out"></span>
</div>
<button class="text-on-surface-variant hover:text-error transition-colors">
<span class="material-symbols-outlined text-[18px]">delete</span>
</button>
</div>
</td>
</tr>
<!-- Rule 2 -->
<tr class="hover:bg-black/[0.01]">
<td class="px-4 py-3 font-medium">Steam</td>
<td class="px-4 py-3">
<span class="px-2 py-0.5 rounded bg-zinc-100 text-zinc-600 text-[10px] font-bold border border-zinc-200 uppercase">App</span>
</td>
<td class="px-4 py-3 text-on-surface-variant font-mono">com.valvesoftware.steam</td>
<td class="px-4 py-3">
<div class="flex items-center justify-end space-x-3">
<div class="relative inline-flex h-4 w-7 shrink-0 cursor-pointer rounded-full border border-transparent transition-colors duration-200 bg-primary">
<span class="translate-x-3 pointer-events-none inline-block h-3 w-3 transform rounded-full bg-white shadow-sm transition duration-200 ease-in-out"></span>
</div>
<button class="text-on-surface-variant hover:text-error transition-colors">
<span class="material-symbols-outlined text-[18px]">delete</span>
</button>
</div>
</td>
</tr>
</tbody>
</table>
</div>
</section>
</div>
</main>
</div>
<script>
    // Simplified UI Interactions
    const buttons = document.querySelectorAll('button:not([disabled])');
    buttons.forEach(btn => {
        btn.addEventListener('mousedown', () => { if(!btn.classList.contains('cursor-default')) btn.style.transform = 'scale(0.97)'; });
        btn.addEventListener('mouseup', () => { btn.style.transform = 'scale(1)'; });
        btn.addEventListener('mouseleave', () => { btn.style.transform = 'scale(1)'; });
    });
</script>
</body></html>
