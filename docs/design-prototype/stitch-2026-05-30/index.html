<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hunter Stitch HTML 设计稿</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f5f7;
        --panel: #ffffff;
        --text: #1d1d1f;
        --muted: #6e6e73;
        --line: #d2d2d7;
        --blue: #007aff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Inter, system-ui, sans-serif;
      }

      header {
        padding: 32px 36px 20px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      main {
        display: grid;
        gap: 20px;
        padding: 0 36px 36px;
      }

      .screen {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--panel);
        box-shadow: 0 14px 34px rgb(0 0 0 / 0.06);
      }

      .screen-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
      }

      .screen-title {
        font-size: 14px;
        font-weight: 600;
      }

      a {
        color: var(--blue);
        font-size: 13px;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      iframe {
        display: block;
        width: 100%;
        height: 760px;
        border: 0;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Hunter Stitch HTML 设计稿</h1>
      <p>基于 Stitch 生成并按评注修订的 Hunter macOS 应用设计稿。</p>
    </header>

    <main>
      <section class="screen">
        <div class="screen-bar">
          <div class="screen-title">01 悬浮监督状态</div>
          <a href="./01-floating-supervisor-states.html">打开 HTML</a>
        </div>
        <iframe src="./01-floating-supervisor-states.html" title="悬浮监督状态"></iframe>
      </section>

      <section class="screen">
        <div class="screen-bar">
          <div class="screen-title">02 设置 - 通用</div>
          <a href="./02-settings-general.html">打开 HTML</a>
        </div>
        <iframe src="./02-settings-general.html" title="设置 - 通用"></iframe>
      </section>

      <section class="screen">
        <div class="screen-bar">
          <div class="screen-title">03 设置 - 黑名单</div>
          <a href="./03-settings-watchlist.html">打开 HTML</a>
        </div>
        <iframe src="./03-settings-watchlist.html" title="设置 - 黑名单"></iframe>
      </section>

      <section class="screen">
        <div class="screen-bar">
          <div class="screen-title">04 设置 - AI 配置</div>
          <a href="./04-settings-ai.html">打开 HTML</a>
        </div>
        <iframe src="./04-settings-ai.html" title="设置 - AI 配置"></iframe>
      </section>

      <section class="screen">
        <div class="screen-bar">
          <div class="screen-title">05 设置 - 声音</div>
          <a href="./05-settings-voice.html">打开 HTML</a>
        </div>
        <iframe src="./05-settings-voice.html" title="设置 - 声音"></iframe>
      </section>

      <section class="screen">
        <div class="screen-bar">
          <div class="screen-title">06 设置 - 历史</div>
          <a href="./06-settings-history.html">打开 HTML</a>
        </div>
        <iframe src="./06-settings-history.html" title="设置 - 历史"></iframe>
      </section>
    </main>
  </body>
</html>
